<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CFO - Personal Financial Officer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">

        <div id="main-content"></div>

        <div class="bottom-nav">
            <div class="nav-item" id="nav-dashboard">
                <i class="fa-solid fa-house"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" id="nav-transactions">
                <i class="fa-solid fa-list-check"></i>
                <span>Transactions</span>
            </div>
            <div class="nav-item" id="nav-chat">
                <i class="fa-solid fa-comment-dots"></i>
                <span>CFO Chat</span>
            </div>
            <div class="nav-item" id="nav-goals">
                <i class="fa-solid fa-bullseye"></i>
                <span>Goals</span>
            </div>
            <div class="nav-item" id="nav-analytics">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Analytics</span>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
